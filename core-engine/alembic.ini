# Alembic 설정 파일
# Core Engine의 데이터베이스 마이그레이션을 관리한다.

[alembic]
# 마이그레이션 스크립트 디렉토리 경로
script_location = app/db/migrations

# 마이그레이션 파일명 템플릿
# 예: 001_initial_schema
file_template = %%(rev)s_%%(slug)s

# sys.path에 추가할 경로 (현재 디렉토리)
prepend_sys_path = .

# 타임존 설정 (UTC 사용)
timezone = UTC

# sqlalchemy.url은 env.py에서 동적으로 설정하므로 여기서는 비워둔다.
# sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
